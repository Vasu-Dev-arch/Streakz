<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Streakz — Offline</title>
  <style>
    :root {
      --bg: #0e0e12;
      --bg2: #16161d;
      --text: #e8e8f0;
      --text2: #9090a8;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --border: rgba(255,255,255,0.07);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { color: var(--text2); font-size: 14px; line-height: 1.7; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 11px 28px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--accent2); }
    .logo {
      font-size: 13px;
      color: var(--accent2);
      font-weight: 700;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Streakz</div>
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>
      No internet connection detected. Your habits, journal, and goals are
      still available — any changes you make will sync automatically when
      you're back online.
    </p>
    <a class="btn" href="/dashboard">Open App</a>
  </div>
</body>
</html>
