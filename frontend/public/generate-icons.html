<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Streakz Icon Generator</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee;padding:24px}
canvas{border-radius:12px;margin:8px}
button{background:#7c6af7;color:white;border:none;padding:12px 24px;font-size:15px;border-radius:8px;cursor:pointer;margin-top:16px}
button:hover{background:#9d8bff}
#previews{display:flex;flex-wrap:wrap;align-items:flex-end;margin-top:20px}
p{color:#aaa;margin:8px 0}
</style>
</head>
<body>
<h2>Streakz PWA Icon Generator</h2>
<p>1. Click the button below — it will generate and auto-download all icon sizes.</p>
<p>2. Move the downloaded files into <code>frontend/public/icons/</code></p>
<button onclick="generateAll()">Generate &amp; Download All Icons</button>
<div id="previews"></div>
<script>
const SIZES=[72,96,128,144,152,192,384,512];
function drawIcon(size){
  const c=document.createElement('canvas');
  c.width=size;c.height=size;
  const ctx=c.getContext('2d'),r=size*0.18,cx=size/2,cy=size/2;
  ctx.fillStyle='#1a1730';
  ctx.beginPath();ctx.moveTo(r,0);
  ctx.arcTo(size,0,size,size,r);ctx.arcTo(size,size,0,size,r);
  ctx.arcTo(0,size,0,0,r);ctx.arcTo(0,0,size,0,r);
  ctx.closePath();ctx.fill();
  const g=ctx.createRadialGradient(cx,cy-size*.05,size*.05,cx,cy,size*.38);
  g.addColorStop(0,'#a78bfa');g.addColorStop(1,'#7c6af7');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,size*.32,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.font=`bold ${Math.round(size*.38)}px Arial,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('S',cx,cy+size*.02);
  return c;
}
function generateAll(){
  const box=document.getElementById('previews');box.innerHTML='';
  SIZES.forEach(s=>{
    const c=drawIcon(s);box.appendChild(c);
    const a=document.createElement('a');
    a.download=`icon-${s}x${s}.png`;a.href=c.toDataURL('image/png');a.click();
  });
}
</script>
</body>
</html>
